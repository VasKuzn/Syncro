name: Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  SERVER_HOST: 5.53.124.148
  SERVER_USER: root
  SERVER_PATH: /root/syncro

jobs:
  build-and-deploy:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v3

      # Установка SSH-ключа
      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2.3.1
        with:
          key: "${{ secrets.MY_KEY }}"
          known_hosts: "just-a-placeholder-so-we-dont-get-errors"
      
      - name: Add server to known_hosts
        run: ssh-keyscan -H ${{ env.SERVER_HOST }} >> ~/.ssh/known_hosts

      # Копирование кода на сервер
      - name: Deploy code to server
        run: |
          rsync -avz \
            --delete \
            --exclude='.git' \
            --exclude='.gitignore' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='bin' \
            --exclude='obj' \
            --exclude='.vs' \
            --exclude='.env' \
            --exclude='appsettings.*.json' \
            --exclude='password.txt' \
            ./ \
            ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}:${{ env.SERVER_PATH }}/

      # Построение и запуск docker контейнеров
      - name: Build and run Docker containers
        run: |
          ssh ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} \
            "cd ${{ env.SERVER_PATH }} && \
             docker-compose down || true && \
             docker-compose up -d --build"

      # Вывод статуса контейнеров
      - name: Check container status
        run: |
          ssh ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} \
            "cd ${{ env.SERVER_PATH }} && \
             docker-compose ps"